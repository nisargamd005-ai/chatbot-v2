<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
</head>
<body>

<h1>Ask AI</h1>

<form method="post">
    {% csrf_token %}
    <input type="text" name="question" placeholder="Ask something..." style="width:300px;">
    <button type="submit">Enter</button>
</form>

<h2>Answer:</h2>
<p>{{ answer }}</p>

</body>
</html>
